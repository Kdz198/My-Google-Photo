spring.application.name=My-Google-Photo
# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SHOW_SQL:false}

# Tin tưởng X-Forwarded-Proto/Host từ reverse proxy (nginx/traefik)
# Giúp Swagger generate đúng https:// thay vì http://
server.forward-headers-strategy=framework

# OpenAPI server URLs (set qua env khi deploy)
app.openapi.prod-url=${APP_OPENAPI_PROD_URL:}
app.openapi.dev-url=${APP_OPENAPI_DEV_URL:http://localhost:8080}